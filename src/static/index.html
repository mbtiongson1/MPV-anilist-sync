<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Tracker</title>
    <meta name="description" content="Track your anime progress from media players and sync with AniList automatically.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header id="app-header">
            <div class="header-left">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M10 8L16 12L10 16V8Z" fill="currentColor"/>
                    </svg>
                    <span>Anime Tracker</span>
                </div>
            </div>
            <div class="header-right">
                <button id="btn-settings" class="header-btn" title="Settings">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </button>
                <button id="btn-reauthorize" class="header-btn" title="Reauthorize with AniList">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Reauthorize
                </button>
                <button id="btn-full-refresh" class="header-btn" title="Full refresh and clear cache">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                    Refresh & Clear Cache
                </button>
                <div id="status-indicator" class="status-bubble offline">
                    <div class="pulse"></div>
                    <span id="status-text">Not Running</span>
                </div>
            </div>
        </header>

        <div class="top-dashboard-grid" style="display: grid; gap: 1.5rem; grid-template-columns: 320px 1fr; margin-bottom: 2rem; align-items: stretch; height: 350px;">
            <!-- Recent Anime Section -->
            <section id="recent-anime" class="now-playing-card" style="display: flex; flex-direction: column; background: var(--bg-card); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden;">
                <div class="section-header" style="padding: 1rem; border-bottom: 1px solid var(--border); margin: 0; flex-shrink: 0; justify-content: flex-start; gap: 0.5rem;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 8v4l3 3M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Z"/></svg>
                    <h2 style="font-size: 1.1rem; margin: 0;">Recent Anime</h2>
                </div>
                <div id="recent-anime-list" style="padding: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; overflow-y: auto; flex: 1;">
                    <!-- Rendered by JS -->
                </div>
            </section>

            <div class="now-playing-wrapper" style="display: flex; flex-direction: column; height: 100%;">

        <!-- Now Playing Section -->
        <section id="now-playing" class="now-playing-card hidden" style="flex: 1;">
            <div class="np-banner" id="np-banner"></div>
            <div class="np-content">
                <img id="np-cover" class="np-cover" src="" alt="Cover" />
                <div class="np-info">
                    <div class="np-badge" id="np-player-badge">NOW PLAYING</div>
                    <div class="np-header">
                        <h1 id="np-title" class="np-title">—</h1>
                        <div style="display: flex; gap: 0.5rem;">
                            <button id="btn-search-np-torrents" class="icon-btn" title="Search Torrents">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                            </button>
                            <button id="btn-open-np-folder" class="icon-btn" title="Open folder">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>
                            </button>
                            <button id="btn-edit-nowplaying" class="icon-btn" title="View details">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z"/></svg>
                            </button>
                        </div>
                    </div>
                    <p id="np-studio" class="np-studio"></p>
                    <div id="np-season-selector" class="np-season-selector">
                        <label for="np-season">Season:</label>
                        <select id="np-season"></select>
                    </div>
                    <div id="np-stats" class="np-stats"></div>
                    <div id="np-summary" class="np-summary"></div>
                    <button id="np-summary-toggle" class="np-summary-toggle">See more</button>
                    <div id="np-progress-section" class="np-progress-section">
                        <div class="np-progress-controls">
                            <button id="btn-minus" class="icon-btn" aria-label="Decrease Episode">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                            <div class="np-progress-bar-wrap">
                                <div id="np-progress-label" class="np-progress-label">E1 / 12</div>
                                <div id="np-progress-segments" class="progress-segments"></div>
                            </div>
                            <button id="btn-plus" class="icon-btn" aria-label="Increase Episode">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                            </button>
                        </div>
                        <button id="btn-sync" class="sync-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.21l5.83-2.06"/></svg>
                            Sync to AniList
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Idle state -->
        <section id="idle-state" class="idle-card">
            <div class="idle-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <path d="M8 21h8M12 17v4"/>
                    <path d="M10 9l4 2.5L10 14V9Z" fill="currentColor" opacity="0.5"/>
                </svg>
            </div>
            <h2>Waiting for media player...</h2>
            <p>Open a video file in MPV or MPC-HC to start tracking automatically.</p>
        </section>

            </div>
        </div>

        <!-- Anime List Section -->
        <section id="anime-list-section" class="anime-list-section">
            <div class="section-header">
                <div style="display: flex; gap: 1rem; align-items: center;">
                    <h2>My Anime List</h2>
                    <button id="btn-organize-folders" class="secondary-btn" style="font-size: 0.8rem; padding: 0.4rem 0.8rem; display: flex; align-items: center; gap: 0.4rem;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg> Automatically organize anime folders
                    </button>
                </div>
                <button id="btn-refresh-list" class="refresh-btn" aria-label="Refresh anime list" title="Refresh list">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6"/><path d="M2.66 15.57a10 10 0 0 0 17.68-1.27M21.34 8.43a10 10 0 0 0-17.68 1.27"/></svg>
                </button>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar">
                <div class="filter-search">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="filter-name" placeholder="Search anime..." autocomplete="off" />
                </div>
                <select id="filter-season">
                    <option value="">All Seasons</option>
                    <option value="WINTER">Winter</option>
                    <option value="SPRING">Spring</option>
                    <option value="SUMMER">Summer</option>
                    <option value="FALL">Fall</option>
                </select>
                <input type="number" id="filter-year" placeholder="Year" min="1970" max="2030" />
                <select id="filter-sort">
                    <option value="">Default</option>
                    <option value="popularity">Popularity</option>
                    <option value="score">Score</option>
                    <option value="title">Title</option>
                    <option value="progress">Progress</option>
                </select>
                <button id="btn-toggle-view" class="view-toggle-btn" title="Toggle view">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                </button>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button id="tab-current" class="tab active" data-status="CURRENT">
                    In Progress
                    <span id="count-current" class="tab-count">0</span>
                </button>
                <button id="tab-planning" class="tab" data-status="PLANNING">
                    Planning
                    <span id="count-planning" class="tab-count">0</span>
                </button>
                <button id="tab-completed" class="tab" data-status="COMPLETED">
                    Completed
                    <span id="count-completed" class="tab-count">0</span>
                </button>
                <button id="tab-stats" class="tab" data-status="STATS">
                    Stats
                </button>
                <button id="tab-torrents" class="tab" data-status="TORRENTS">
                    Torrents
                </button>
            </div>

            <!-- Anime Card Grid -->
            <div id="anime-grid" class="anime-grid">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading your anime list...</p>
                </div>
            </div>
        </section>

        <!-- Modal for details -->
        <div id="details-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="details-modal-title">
            <div class="modal-overlay" id="modal-overlay"></div>
            <div class="modal-content">
                <header class="modal-header">
                    <h2 id="details-modal-title">Anime Details</h2>
                    <button id="modal-close" class="icon-btn" aria-label="Close modal">✕</button>
                </header>
                <div class="modal-body" id="modal-body">
                    <!-- Populated dynamically -->
                </div>
                <footer class="modal-footer">
                    <button id="modal-close-btn" class="secondary-btn">Close</button>
                </footer>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
            <div class="modal-overlay" id="settings-modal-overlay"></div>
            <div class="modal-content">
                <header class="modal-header">
                    <h2 id="settings-modal-title">Settings</h2>
                    <button id="settings-modal-close" class="icon-btn" aria-label="Close modal">✕</button>
                </header>
                <div class="modal-body" id="settings-modal-body" style="display: flex; flex-direction: column; gap: 15px;">
                    <div class="settings-group">
                        <label for="setting-groups" style="display: block; font-weight: 500; margin-bottom: 5px;">Preferred Release Groups (comma-separated):</label>
                        <input type="text" id="setting-groups" placeholder="e.g. ASW, SubsPlease" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; background: white; color: black;" />
                    </div>
                    <div class="settings-group">
                        <label for="setting-resolution" style="display: block; font-weight: 500; margin-bottom: 5px;">Preferred Resolution:</label>
                        <select id="setting-resolution" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; background: white; color: black;">
                            <option value="1080p">1080p</option>
                            <option value="720p">720p</option>
                            <option value="480p">480p</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label for="setting-download-dir" style="display: block; font-weight: 500; margin-bottom: 5px;">Default Download Directory (leave blank for OS default):</label>
                        <input type="text" id="setting-download-dir" placeholder="e.g. C:\Downloads\Anime" style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc; background: white; color: black;" />
                    </div>
                </div>
                <footer class="modal-footer">
                    <button id="settings-save-btn" class="primary-btn">Save Settings</button>
                </footer>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <div class="links">
                <a href="https://anilist.co/home" target="_blank" rel="noopener noreferrer">Open AniList</a>
                <span class="separator">•</span>
                <a href="https://mpv.io" target="_blank" rel="noopener noreferrer">mpv</a>
                <span class="separator">•</span>
                <a href="https://github.com/clsid2/mpc-hc" target="_blank" rel="noopener noreferrer">mpc-hc</a>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
