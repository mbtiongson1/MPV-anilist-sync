version: '3.8'

services:
  tracker:
    build: .
    container_name: mpv-anilist-sync
    ports:
      - "8080:8080"
    volumes:
      # Mount the MPV IPC socket from the host
      # Note: The host path must match where you start MPV with --input-ipc-server
      - /tmp/mpvsocket:/tmp/mpvsocket
    environment:
      # You can provide your AniList token here or via a .env file
      - ANILIST_TOKEN=${ANILIST_TOKEN}
    restart: unless-stopped
